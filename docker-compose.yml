services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: 3001
    expose:
      - "3001"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
