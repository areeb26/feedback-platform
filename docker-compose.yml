services:
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 3001
      NODE_ENV: production
    expose:
      - "3001"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    image: feedback-platform-web

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
      args:
        WEB_IMAGE: feedback-platform-web
    ports:
      - "8080:80"
    depends_on:
      - api
      - web
    restart: unless-stopped
