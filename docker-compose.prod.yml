# Production overrides — use on the VPS:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Before first HTTPS deploy, obtain certs (see docs/deploy/contabo.md) and replace
# YOUR_DOMAIN in docker/nginx.prod.conf.

services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"

volumes:
  certbot_www:
  certbot_certs:
